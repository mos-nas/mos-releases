name: Create MOS Release

on:
  # Allow to trigger action manually
  workflow_dispatch:
    inputs:
      mos_version:
        description: 'MOS Version'
        required: false
        type: string

jobs:
  create_release:
    runs-on: [self-hosted, X64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 1

    - name: Trigger mos-releases arm64 build form workflow
      if: success()
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: 'mos-releases',
            workflow_id: 'create_release_arm.yml',
            ref: 'master'
          })

    - name: Install dependencies
      run: apt-get update && apt-get -y install parted mtools dosfstools zip wget

    - name: Create Release
      run: |
        # Set Variables and create directories
        WORKDIR=${{ github.workspace }}
        PACKAGE=$WORKDIR/package
        mkdir -p $PACKAGE/EFI/BOOT $PACKAGE/grub

        # Get JSONs
        ROOTFS_JSON=$(curl -s --request GET \
            --url "https://api.github.com/repos/${{ github.repository_owner }}/mos-rootfs/releases?per_page=50" \
            --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            --header "X-GitHub-Api-Version: 2022-11-28")

        KERNEL_JSON=$(curl -s --request GET \
            --url "https://api.github.com/repos/${{ github.repository_owner }}/mos-kernel/releases?per_page=50" \
            --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            --header "X-GitHub-Api-Version: 2022-11-28")

        GRUB_JSON=$(curl -s --request GET \
            --url "https://api.github.com/repos/${{ github.repository_owner }}/mos-grub/releases/latest" \
            --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            --header "X-GitHub-Api-Version: 2022-11-28")

        MEMTEST_V=$(curl -s -u ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} https://api.github.com/repos/${{ github.repository_owner }}/mos-memtest86plus/releases/latest | jq -r '.tag_name' | sed 's/^v//')

        GRUB_DEB=$(echo $GRUB_JSON | jq -r '.assets[] | select(.name | startswith("mos-grub") and endswith("amd64.deb")) | .id')
        GRUB_DEB_MD5=$(echo $GRUB_JSON | jq -r '.assets[] | select(.name | startswith("mos-grub") and endswith("amd64.deb.md5")) | .id')

        # Set VERSION
        if [ -z "${{ github.event.inputs.mos_version }}" ] ; then
          VERSION="$(echo $ROOTFS_JSON | jq -r '.[].tag_name' | sort -V | tail -1)"
        else
          VERSION="${{ github.event.inputs.mos_version }}"
        fi

        # Check if VERSION is empty
        if [ -z "$VERSION" ] ; then
          echo "VERSION string empty"
          exit 1
        fi

        echo "Release version: $VERSION"

        # Get Assets from rootfs
        ASSET_ROOTFS=$(echo $ROOTFS_JSON | jq --arg version $VERSION -r '.[] | select(.tag_name == $version) | .assets[] | select(.name == "rootfs") | .id')
        ASSET_ROOTFS_MD5=$(echo $ROOTFS_JSON | jq --arg version $VERSION -r '.[] | select(.tag_name == $version) | .assets[] | select(.name == "rootfs.md5") | .id')
        ASSET_RELEASE_JSON=$(echo $ROOTFS_JSON | jq --arg version $VERSION -r '.[] | select(.tag_name == $version) | .assets[] | select(.name == "mos-release.json") | .id')

        # Get mos-release.json
        RELEASE_JSON=$(curl -s -L \
          --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          --header "Accept: application/octet-stream" \
          --header "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${{ github.repository_owner }}/mos-rootfs/releases/assets/$ASSET_RELEASE_JSON")

        # Get recommended Kernel version for release
        RECOMMENDED_KERNEL=$(echo $RELEASE_JSON | jq -r '.mos.recommended_kernel')

        # Get Assets from Kernel, Drivers and Microcode
        ASSET_KERNEL=$(echo $KERNEL_JSON | jq --arg kernel $RECOMMENDED_KERNEL -r '.[] | select(.tag_name == $kernel) | .assets[] | select(.name == "image") | .id')
        ASSET_DRIVERS=$(echo $KERNEL_JSON | jq --arg kernel $RECOMMENDED_KERNEL -r '.[] | select(.tag_name == $kernel) | .assets[] | select(.name == "drivers") | .id')
        ASSET_MICROCODE=$(echo $KERNEL_JSON | jq --arg kernel $RECOMMENDED_KERNEL -r '.[] | select(.tag_name == $kernel) | .assets[] | select(.name == "microcode") | .id')
        ASSET_KERNEL_MD5=$(echo $KERNEL_JSON | jq --arg kernel $RECOMMENDED_KERNEL -r '.[] | select(.tag_name == $kernel) | .assets[] | select(.name == "image.md5") | .id')
        ASSET_DRIVERS_MD5=$(echo $KERNEL_JSON | jq --arg kernel $RECOMMENDED_KERNEL -r '.[] | select(.tag_name == $kernel) | .assets[] | select(.name == "drivers.md5") | .id')
        ASSET_MICROCODE_MD5=$(echo $KERNEL_JSON | jq --arg kernel $RECOMMENDED_KERNEL -r '.[] | select(.tag_name == $kernel) | .assets[] | select(.name == "microcode.md5") | .id')

        # Define download asset function including md5 check
        download_asset() {
          echo "Downloading file: ${2##*/}"
          curl --progress-bar -L \
            --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            --header "Accept: application/octet-stream" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output "$2" \
            "https://api.github.com/repos/${{ github.repository_owner }}/mos-$1/releases/assets/$3"
        
          if [[ "$2" == *.md5 ]]; then
            echo "Checking md5"
            if [ "$(md5sum ${2%.*} | awk '{print $1}')" == "$(cat $2)" ] ; then
              echo "md5 OK"
            else
              echo "md5 ERROR"
              exit 1
            fi
          fi
        }

        # Download assets
        download_asset "rootfs" "$PACKAGE/rootfs" "$ASSET_ROOTFS"
        download_asset "rootfs" "$PACKAGE/rootfs.md5" "$ASSET_ROOTFS_MD5"
        download_asset "kernel" "$PACKAGE/image" "$ASSET_KERNEL"
        download_asset "kernel" "$PACKAGE/image.md5" "$ASSET_KERNEL_MD5"
        download_asset "kernel" "$PACKAGE/drivers" "$ASSET_DRIVERS"
        download_asset "kernel" "$PACKAGE/drivers.md5" "$ASSET_DRIVERS_MD5"
        download_asset "kernel" "$PACKAGE/microcode" "$ASSET_MICROCODE"
        download_asset "kernel" "$PACKAGE/microcode.md5" "$ASSET_MICROCODE_MD5"
        download_asset "grub" "$WORKDIR/grub.deb" "$GRUB_DEB"
        download_asset "grub" "$WORKDIR/grub.deb.md5" "$GRUB_DEB_MD5"

        # Download Memtest86+
        echo "Downloading file: memtest-$MEMTEST_V.tar.gz"
        wget -q -O $WORKDIR/memtest-$MEMTEST_V.tar.gz https://github.com/${{ github.repository_owner }}/mos-memtest86plus/releases/download/v$MEMTEST_V/memtest-$MEMTEST_V.tar.gz
        echo "Downloading file: memtest-$MEMTEST_V.tar.gz.md5"
        wget -q -O $WORKDIR/memtest-$MEMTEST_V.tar.gz.md5 https://github.com/${{ github.repository_owner }}/mos-memtest86plus/releases/download/v$MEMTEST_V/memtest-$MEMTEST_V.tar.gz.md5
        if [ "$(md5sum $WORKDIR/memtest-$MEMTEST_V.tar.gz | awk '{print $1}')" == "$(cat $WORKDIR/memtest-$MEMTEST_V.tar.gz.md5)" ] ; then
          echo "md5 OK"
        else
          echo "md5 ERROR"
          exit 1
        fi

        # Unpack Memtest86+
        tar -C $PACKAGE/ -xf $WORKDIR/memtest-$MEMTEST_V.tar.gz

        # Install GRUB
        apt -y install $WORKDIR/grub.deb

        # Install BOOTX64.EFI to package directory
        grub-mkimage \
            --format=x86_64-efi \
            --output=$PACKAGE/EFI/BOOT/BOOTX64.EFI \
            --prefix="/grub" \
            normal configfile search search_fs_file search_fs_uuid part_gpt part_msdos fat

        # Copy GRUB modules, create fonts and locale directories
        cp -r /usr/lib/grub/x86_64-efi $PACKAGE/grub/
        mkdir -p $PACKAGE/grub/{fonts,locale}

        # Download mos-boot-files
        git clone https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/mos-boot-files $WORKDIR/mos-boot-files

        # Copy necessary mos-boot-files to package directory
        cp -R $WORKDIR/mos-boot-files/config $WORKDIR/mos-boot-files/grub $PACKAGE

        # Create directories
        mkdir -p $PACKAGE/optional/{modprobe.d,packages} $PACKAGE/optional/scripts/cron

        # Create 2G image file
        dd if=/dev/zero of=$WORKDIR/mos_amd64.img bs=1M count=2048

        # Prepare image for formatting
        parted -s $WORKDIR/mos_amd64.img mklabel msdos
        parted -s $WORKDIR/mos_amd64.img mkpart primary fat32 1MiB 100%
        parted -s $WORKDIR/mos_amd64.img set 1 boot on

        # Create FAT32 filesystem with label MOS
        mkfs.fat -F 32 -n "MOS" $WORKDIR/mos_amd64.img

        # Prepare config for mtools
        echo "drive x: file=\"$WORKDIR/mos_amd64.img\"" > /root/.mtoolsrc

        # Copy over files from package directory to image
        mcopy -s $PACKAGE/* x:/

        # Create xz archive from image
        xz -9 -T0 $WORKDIR/mos_amd64.img

        # Create zip archive from package directory
        cd $PACKAGE
        zip -9 -r $WORKDIR/mos_${VERSION}_amd64.zip .

        # Create md5 checksums
        md5sum $WORKDIR/mos_amd64.img.xz | awk '{print $1}' > $WORKDIR/mos_amd64.img.xz.md5
        md5sum $WORKDIR/mos_${VERSION}_amd64.zip | awk '{print $1}' > $WORKDIR/mos_${VERSION}_amd64.zip.md5

        # Set if release is a prerelease
        if [[ $VERSION == *alpha* ]]; then
          PRERELEASE="true"
        elif [[ $VERSION == *beta* ]]; then
          PRERELEASE="true"
        else
          PRERELEASE="false"
        fi

        # Add necessary variables to environment
        echo "VERSION=${VERSION}
        PRERELEASE=${PRERELEASE}" >> $GITHUB_ENV

    - name: Create and Upload Release
      uses: softprops/action-gh-release@v2
      with:
        prerelease: ${{ env.PRERELEASE }}
        tag_name: ${{ env.VERSION }}
        files: |
          ${{ github.workspace }}/mos_${{ env.VERSION }}_amd64.zip
          ${{ github.workspace }}/mos_${{ env.VERSION }}_amd64.zip.md5
          ${{ github.workspace }}/mos_amd64.img.xz
          ${{ github.workspace }}/mos_amd64.img.xz.md5
        overwrite_files: true
        name: "MOS ${{ env.VERSION }}"
        body: |
          MOS Release: v${{ env.VERSION }}
          Note: MOS only supports UEFI boot by default

          ### Release contents:
          - [mos_${{ env.VERSION }}_amd64.zip](https://github.com/${{ github.repository_owner }}/mos-releases/releases/download/${{ env.VERSION }}/mos_${{ env.VERSION }}_amd64.zip) - for installation to physical media
            (The disk must be formatted with FAT32 and the disk must have the label: `MOS`)
          - [mos_${{ env.VERSION }}_arm64.zip](https://github.com/${{ github.repository_owner }}/mos-releases/releases/download/${{ env.VERSION }}/mos_${{ env.VERSION }}_arm64.zip) - for installation to physical media
            (The disk must be formatted with FAT32 and the disk must have the label: `MOS`, additionally possibly needs a device tree file)
          - [mos_amd64.img.xz](https://github.com/${{ github.repository_owner }}/mos-releases/releases/download/${{ env.VERSION }}/mos_amd64.img.xz) - for installation to VMs (Min Reqs: 2 Cores + 6GB RAM)
            (To extract the image you need to use this command on Linux: `unxz --decompress mos_amd64.img.xz`)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Send Message
      run: |
        wget ${{ secrets.PUSH_URL }} --post-data "title=MOS&message=New MOS release: ${{ env.VERSION }} available&priority=5" &>/dev/null
  
    - name: Set notification variables on success
      if: success()
      run: |
        echo "NOTIFICATION_PRIORITY=0" >> $GITHUB_ENV
        echo "NOTIFICATION_MESSAGE=https://github.com/${{ github.repository_owner }}/mos-releases/releases/tag/${{ env.VERSION }}" >> $GITHUB_ENV

    - name: Cleanup & Notification
      if: always()
      run: |
        # Discord notification function
        discord_push_notification() {
          if [ $3 -ge 1 ]; then
            COLOR=16711680
          else
            COLOR=65280
          fi

          data=$(cat <<EOF
        {
          "embeds": [{
            "title": "${1}",
            "description": "${2}",
            "color": ${COLOR}
          }]
        }
        EOF
        )
          curl -H "Content-Type: application/json" -d "$data" "${{ secrets.DISCORD_WEBHOOK_URL }}"
        }

        if [ ! -z "${{ env.NOTIFICATION_PRIORITY }}" ] ; then
          discord_push_notification "MOS ${{ env.VERSION }}" "${{ env.NOTIFICATION_MESSAGE }}" "${{ env.NOTIFICATION_PRIORITY }}"
        fi
        rm -rf ${{ github.workspace }}/* ${{ github.workspace }}/.*
